root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  include_ext = ["go", "sql", "yaml"]
  exclude_dir = ["tmp", "bin", "node_modules", ".git", "pkg/db/generated"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true
  log = "build-errors.log"

[log]
  time = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = true
